{% extends "base.html" %}

{% block content %}

<h2>Super Admin Dashboard</h2>

<div class="row">

    <div class="col-md-3">
        <div class="card">
            <div class="card-body">
                <h3>{{ total_colleges }}</h3>
                <p>Total Colleges</p>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card">
            <div class="card-body">
                <h3>{{ pending_colleges }}</h3>
                <p>Pending</p>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card">
            <div class="card-body">
                <h3>{{ approved_colleges }}</h3>
                <p>Approved</p>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card">
            <div class="card-body">
                <h3>{{ rejected_colleges }}</h3>
                <p>Rejected</p>
            </div>
        </div>
    </div>

</div>

{% endblock %}
